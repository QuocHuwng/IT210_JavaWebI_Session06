<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="layout/header :: header(${title})"></div>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Tác giả</th>
        <th>Giá</th>
        <th>Action</th>
    </tr>

    <tr th:each="b : ${books}"
        th:classappend="${b.price >= 300000} ? 'highlight'">
        <td th:text="${b.id}"></td>
        <td th:text="${b.name}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.price}"></td>
        <td>
            <a th:href="@{/books/{id}(id=${b.id})}">Chi tiết</a>
        </td>
    </tr>
</table>



<div th:replace="layout/footer :: footer"></div>

</body>
</html>
